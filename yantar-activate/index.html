<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Yantar Pro - Activando...</title>
  <style>
    body {
      font-family: -apple-system, BlinkMacSystemFont, sans-serif;
      background: #1C1917;
      color: #FAFAF9;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      margin: 0;
      text-align: center;
    }
    .container { padding: 2rem; max-width: 400px; }
    h1 { color: #F97316; font-size: 1.5rem; }
    p { color: #A8A29E; line-height: 1.6; }
    a {
      display: inline-block;
      margin-top: 1rem;
      padding: 0.75rem 2rem;
      background: #F97316;
      color: white;
      text-decoration: none;
      border-radius: 12px;
      font-weight: bold;
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>Yantar Pro</h1>
    <p>Redirigiendo a la app...</p>
    <a id="open-app" href="#">Abrir Yantar</a>
  </div>
  <script>
    const params = new URLSearchParams(window.location.search);
    const checkoutId = params.get('checkout_id') || '';
    const deepLink = 'yantar://activate?checkout_id=' + encodeURIComponent(checkoutId);

    document.getElementById('open-app').href = deepLink;

    // Auto-redirect after a brief moment
    setTimeout(function() {
      window.location.href = deepLink;
    }, 500);
  </script>
</body>
</html>
